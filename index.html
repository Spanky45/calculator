<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
    <style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap');
</style>
</head>
<body>
    <div class="container">
        <div class="cal-body">
            <div class="cal-screen">
                <p>peepee poo poo</p>
            </div>
            <div class="button-wrapper">
                <div class="back-button button">Del</div>
                <div class="clear button">AC</div>
                <div class="percent button">%</div>
                <div class="divide button" id="operator"><img src="divide.png" width="60px" height="60px"></div>
                <div class="seven button">7</div>
                <div class="eight button">8</div>
                <div class="nine button">9</div>
                <div class="multiply button" id="operator">x</div>
                <div class="four button">4</div>
                <div class="five button">5</div>
                <div class="six button">6</div>
                <div class="subtract button" id="operator">-</div>
                <div class="one button">1</div>
                <div class="two button">2</div>
                <div class="three button">3</div>
                <div class="add button" id="operator">+</div>
                <div class="plus-minus button">+/-</div>
                <div class="zero button">0</div>
                <div class="decimal button">.</div>
                <div class="equals button" id="operator">=</div>
            </div>
        </div>
    </div>


    <script src="index.js"></script>
</body>
</html>
