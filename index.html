<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>

<link rel="stylesheet" href="styles.css">

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">
    <div class="cal-body">

        <div class="cal-screen">
            <p class="cal-text">0</p>
        </div>

        <div class="button-wrapper">

            <div class="button back-button">Del</div>
            <div class="button clear">AC</div>
            <div class="button percent">%</div>
            <div class="operator divide">÷</div>

            <div class="button seven">7</div>
            <div class="button eight">8</div>
            <div class="button nine">9</div>
            <div class="operator multiply">x</div>

            <div class="button four">4</div>
            <div class="button five">5</div>
            <div class="button six">6</div>
            <div class="operator subtract">-</div>

            <div class="button one">1</div>
            <div class="button two">2</div>
            <div class="button three">3</div>
            <div class="operator add">+</div>

            <div class="button plus-minus">+/-</div>
            <div class="button zero">0</div>
            <div class="button decimal">.</div>
            <div class="operator equals">=</div>

        </div>

    </div>
</div>

<script src="index.js"></script>

</body>
</html>
